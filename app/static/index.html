<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>downwind &middot; air you can check</title>
<style>
  :root {
    --ink: #1e293b; --sub: #64748b; --line: #e2e8f0;
    --panel: rgba(255,255,255,.92); --accent: #0ea5e9; --good: #22c55e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden;
    font-family: "Inter", "Segoe UI", system-ui, sans-serif; color: var(--ink); }
  #map { position: absolute; inset: 0; width: 100%; height: 100%;
    background: #dbeafe; cursor: grab; touch-action: none; }
  .panel { position: absolute; background: var(--panel); backdrop-filter: blur(8px);
    border: 1px solid var(--line); border-radius: 14px;
    box-shadow: 0 8px 28px rgba(15,23,42,.10); }
  header.panel { top: 14px; left: 14px; padding: 12px 18px; max-width: 380px; }
  header h1 { font-size: 19px; letter-spacing: .02em; font-weight: 700; }
  header h1 em { font-style: normal; color: var(--accent); }
  header .tag { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .chips { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .chip { font-size: 11.5px; padding: 3px 10px; border-radius: 999px;
    border: 1px solid var(--line); background: #f8fafc; color: var(--sub); }
  .chip b { color: var(--ink); font-weight: 600; }
  #chip-status.live { border-color: #bbf7d0; background: #f0fdf4; color: #15803d; }
  #chip-status.prior { border-color: #fde68a; background: #fffbeb; color: #b45309; }
  .toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 10px;
    overflow: hidden; margin-top: 10px; }
  .toggle button { border: 0; background: #f8fafc; color: var(--sub); font: inherit;
    font-size: 12.5px; font-weight: 600; padding: 6px 16px; cursor: pointer; }
  .toggle button.on { background: var(--accent); color: #fff; }
  #rail { top: 14px; right: 14px; width: 300px; padding: 14px 16px;
    max-height: calc(100% - 100px); overflow: auto; }
  #rail h2 { font-size: 12px; letter-spacing: .12em; color: var(--sub);
    text-transform: uppercase; margin-bottom: 8px; }
  #rail .spot { padding: 9px 10px; border: 1px solid var(--line); border-radius: 10px;
    margin-bottom: 8px; cursor: pointer; background: #fff; transition: border-color .15s; }
  #rail .spot:hover { border-color: var(--accent); }
  #rail .spot .v { font-size: 16px; font-weight: 700; }
  #rail .spot .w { font-size: 11.5px; color: var(--sub); margin-top: 2px; }
  #card { bottom: 16px; left: 14px; width: 340px; padding: 16px 18px; display: none; }
  #card.show { display: block; }
  #card .x { position: absolute; top: 8px; right: 12px; cursor: pointer;
    color: var(--sub); font-size: 18px; }
  #card h3 { font-size: 13px; color: var(--sub); font-weight: 500; }
  #card .big { display: flex; gap: 22px; margin: 8px 0 4px; }
  #card .big .v { font-size: 26px; font-weight: 700; }
  #card .big .u { font-size: 11px; color: var(--sub); }
  #card ul { list-style: none; margin-top: 8px; }
  #card li { font-size: 12.5px; color: var(--ink); padding: 3px 0 3px 14px; position: relative; }
  #card li::before { content: ""; position: absolute; left: 0; top: 9px; width: 6px;
    height: 6px; border-radius: 3px; background: var(--accent); }
  #card .near { margin-top: 8px; font-size: 12px; color: var(--sub); }
  #card .near b { color: var(--ink); }
  #card a { color: var(--accent); font-size: 12px; text-decoration: none; margin-right: 12px; }
  #legend { bottom: 16px; right: 14px; padding: 10px 14px; font-size: 11px; color: var(--sub); }
  #legend .bar { width: 180px; height: 9px; border-radius: 5px; margin: 5px 0 2px; }
  #legend .bar.pred { background: linear-gradient(90deg,#fef9c3,#fbbf24,#f97316,#dc2626,#7f1d1d); }
  #legend .bar.meas { background: linear-gradient(90deg,#ccfbf1,#2dd4bf,#0891b2,#1e40af,#1e1b4b); }
  #legend .lab { display: flex; justify-content: space-between; }
  #legend .cap { margin-top: 7px; font-weight: 600; color: var(--ink); font-size: 11px; }
  #player { bottom: 16px; left: 50%; transform: translateX(-50%);
    padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
  #play { width: 34px; height: 34px; border-radius: 50%; border: 0; cursor: pointer;
    background: var(--accent); color: #fff; font-size: 14px; }
  #tslider { width: 260px; accent-color: var(--accent); }
  #tlabel { font-size: 12px; color: var(--sub); min-width: 118px; font-variant-numeric: tabular-nums; }
  #tlabel b { color: var(--ink); }
  noscript.panel { top: 100px; left: 14px; padding: 16px; display: block; max-width: 420px; }
</style>
</head>
<body>
<canvas id="map"></canvas>

<header class="panel">
  <h1>down<em>wind</em></h1>
  <div class="tag">ground-level air quality where no sensor exists &middot; CAMS prior refined by local weather + context</div>
  <div class="chips">
    <span class="chip"><b id="s-stations">&ndash;</b>&nbsp;stations</span>
    <span class="chip" id="chip-status">starting&hellip;</span>
    <span class="chip"><b id="s-clock"></b></span>
  </div>
  <div class="toggle">
    <button data-p="pm25" class="on">PM2.5</button>
    <button data-p="no2">NO&#8322;</button>
  </div>
</header>

<aside id="rail" class="panel">
  <h2>Unmonitored hotspots</h2>
  <div id="spots"><!-- js --></div>
</aside>

<div id="card" class="panel"></div>

<div id="player" class="panel">
  <button id="play">&#9654;</button>
  <input id="tslider" type="range" min="0" max="24" value="12">
  <span id="tlabel"><b>now</b></span>
</div>

<div id="legend" class="panel">
  <div id="leg-title" style="font-weight:600;color:var(--ink)">PM2.5, ug/m3</div>
  <div class="cap">predicted field</div>
  <div class="bar pred"></div>
  <div class="lab"><span>0</span><span id="leg-max-p">30+</span></div>
  <div class="cap">measured stations</div>
  <div class="bar meas"></div>
  <div class="lab"><span>0</span><span id="leg-max-m">30+</span></div>
  <div class="cap" style="display:flex;align-items:center;gap:7px">
    <span style="display:inline-block;width:26px;border-top:2px dashed #0891b2"></span>
    sensor-anchored zone (25 km)
  </div>
</div>

<noscript class="panel">
  <h2>Latest unmonitored hotspots</h2>
  <ul><!--__HOTSPOTS__--></ul>
</noscript>

<script>window.__INIT__ = /*__INIT__*/null;</script>
<script src="static/app.js"></script>
</body>
</html>
